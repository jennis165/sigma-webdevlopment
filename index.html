<!DOCTYPE html>
<html>
    <head> 
        <title>Forms</title>
     </head>
    <body>
        <div>
        <h2>registeration</h2>
        <p>form open for mern stack developer</p>
            <label for="username">Enter Your username:</label>
        <input type="text"  id="username" name="username" placeholder="enter your username..."  >
        
        </div>
        <div>
            
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id="female" name="gender" value="female"> 
            <label for="female">female</label>
            <div>
                <input type="checkbox" id="subscription" name="newsletter">
                <label for="subscription" >subscribe for  newsletter</label>
            </div>
            <div>

                <label for="comment" ></label>
                <textarea id="comment" name="description" rows="7" cols="14" placeholder="enter your text here..." ></textarea>
            </div>
            <div>
                <p>select you favourite fruit</p>
                <select name="fruit" >
                    <option value="apple">apple</option>
                    <option value="mango">mango</option>
                    <option value="banana">banana</option>
                </select>
            </div>
            <div>
                <button>Submit</button>
            </div>
            
            

        </div>
    </body>
</html>
